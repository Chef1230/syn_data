# Training database generation config for syn_v1.
# Use this with:
#   bash syn_data/scripts/run_full_pipeline.sh syn_data/configs/v1.yaml
seed: 42

paths:
  # Relative paths are resolved from the syn_data project directory.
  database_output_root: outputs/databases/syn_v1

logging:
  # Command-line --log-level/--log-file and RDB_PRIOR_LOG_* override these defaults.
  enabled: true
  level: INFO
  file: outputs/logs/syn_v1_pipeline.log
  max_bytes: 52428800
  backup_count: 5

generation:
  # One generated DB/task bundle becomes one RDBPFN episode in the exported H5.
  num_databases: 10000
  schema_id_prefix: syn_v1_db
  start_time: "2020-01-01"
  end_time: "2022-01-01"
  cutoff_time: null
  future_window_days: 30
  history_window_days: 365
  enable_leakage_guard: true

  # Training-size setting. With current schema row priors this yields roughly:
  # entity ~= 500 rows, event ~= 250-500 rows, bridge/summary up to 2500 rows.
  # This keeps most task labels above the 256-row RDBPFN episode length while
  # avoiding full-scale raw RDB dumps for v1.
  row_scale: 1.0
  max_rows_per_table: null

schema:
  min_tables: 3
  max_tables: 8
  max_depth: 3
  schema_depth_values: [1, 2, 3]
  schema_depth_weights: [0.25, 0.50, 0.25]
  min_edge_density: 0.8
  max_edge_density: 1.4
  min_motifs: 1
  max_motifs: 4
  max_motif_rank_span: 3
  require_connected: true
  allow_rank_skip_edges: true
  allow_parallel_fk: false
  require_entity: true
  require_event: true
  max_outcome_tables: 1
  require_bridge_parents: true
  min_bridge_parents: 2
  add_random_edges: true
  max_edge_attempts: 300
  enable_motif_edges: true
  enable_transition_check: true
  strict_transition_check: false

task:
  enabled: true
  # Each database contributes between one and three distinct task episodes.
  min_tasks_per_database: 1
  max_tasks_per_database: 3
  # null means auto priority: outcome -> summary -> entity -> event.
  target_source_role: null
  target_source_table: null
  positive_rate: 0.35
  fail_on_error: true

rdbpfn_export:
  enabled: true
  output_path: ../RDB_PFN/model_pretrain/pretrain_datasets/syn_v1_tasks.h5
  total_rows: 256
  max_columns: 128
  include_val_as_query: true
  compression: lzf
