# Main one-click pipeline config for syn_data.
# Scripts read this file by default; override with RDB_PRIOR_CONFIG or the first script argument.
seed: 42

paths:
  # Relative paths are resolved from the syn_data project directory.
  database_output_root: outputs/databases/sample_50

generation:
  num_databases: 50
  schema_id_prefix: db
  start_time: "2020-01-01"
  end_time: "2022-01-01"
  cutoff_time: null
  future_window_days: 30
  history_window_days: 365
  enable_leakage_guard: true
  # Keep sample DBs small while preserving schema-level role row-count priors.
  row_scale: 0.001
  max_rows_per_table: 500

schema:
  min_tables: 3
  max_tables: 8
  max_depth: 3
  schema_depth_values: [1, 2, 3]
  schema_depth_weights: [0.25, 0.50, 0.25]
  min_edge_density: 0.8
  max_edge_density: 1.4
  min_motifs: 1
  max_motifs: 4
  max_motif_rank_span: 3
  require_connected: true
  allow_rank_skip_edges: true
  allow_parallel_fk: false
  require_entity: true
  require_event: true
  max_outcome_tables: 1
  require_bridge_parents: true
  min_bridge_parents: 2
  add_random_edges: true
  max_edge_attempts: 300
  enable_motif_edges: true
  enable_transition_check: true
  strict_transition_check: false

task:
  enabled: true
  # Sample a reproducible number of distinct task source tables per database.
  min_tasks_per_database: 1
  max_tasks_per_database: 3
  # null means auto priority: outcome -> summary -> entity -> event.
  # Set to outcome/entity/event/summary to force one task source role.
  target_source_role: null
  target_source_table: null
  positive_rate: 0.35
  fail_on_error: true

rdbpfn_export:
  # run_full_pipeline.sh exports this HDF5 when h5py is installed.
  enabled: true
  output_path: ../RDB_PFN/model_pretrain/pretrain_datasets/syn_role_tasks.h5
  total_rows: 256
  max_columns: 128
  include_val_as_query: true
  compression: lzf
